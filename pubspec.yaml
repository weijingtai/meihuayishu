name: meihuayishu
description: "Mei Hua Yi Shu (Plum Blossom Numerology) divination module"
version: 1.0.0+1

environment:
  sdk: '>=3.2.3 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  logger: ^2.6.2
  tuple: ^2.0.2
  intl: ^0.20.2
  meta: ^1.17.0
  collection: ^1.19.1
  google_fonts: ^8.0.0
  provider: ^6.1.5+1
  cupertino_icons: ^1.0.8
  tyme: ^1.4.1
  json_serializable: ^6.12.0
  json_annotation: ^4.10.0
  flutter_screenutil: ^5.9.3
  flutter_sliding_toast: ^1.5.3
  lpinyin: ^2.0.3
  drift: ^2.24.0
  drift_flutter: ^0.2.8
  path_provider: ^2.1.0
  path: ^1.8.3
  sqlite3: ^2.9.4
  common:
    path: ../xuan-common
  persistence_core:
    git:
      url: https://github.com/weijingtai/xuan-storage.git
      path: core
  stroke_order_animator: ^3.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  build_runner: ^2.10.5
  drift_dev: ^2.30.1
  persistence_drift:
    git:
      url: https://github.com/weijingtai/xuan-storage.git
      path: drift

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/
    - assets/sql/
  
  module:
    androidX: true
    androidPackage: com.wjthub.meihuayishu
    iosBundleIdentifier: com.wjthub.meihuayishu

dependency_overrides:
  persistence_core:
    git:
      url: https://github.com/weijingtai/xuan-storage.git
      path: core
